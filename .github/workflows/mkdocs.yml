name: ci
on:
  push:
    branches:
      - master
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --no-dev

      - name: Replace paths for GitHub Pages
        run: |
          find docs/ -type f -name "*.txt" -print0 | xargs -0 sed -i 's|/img/|/courses-wiki/img/|g'
          find docs/ -type f -name "*.md" -print0 | xargs -0 sed -i 's|/img/|/courses-wiki/img/|g'
          sed -i 's|/assets/|/courses-wiki/assets/|g' material/slideshow.html

      - name: Deploy to GitHub Pages
        run: uv run mkdocs gh-deploy --force
